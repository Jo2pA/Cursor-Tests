name: News Digest

on:
  schedule:
    # 22:00 UTC = 07:00 JST 毎朝。GitHub 側の cron が私に依存せず発火する。
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "実行モード"
        type: choice
        default: send
        options:
          - send      # 新着を検出してメール送信＋manifest更新
          - dry-run   # 検出のみ（送信・更新なし）。フィード解決確認用
          - init      # 現在の全項目を既読化（巨大初回メール回避のベースライン）

# manifest.json をコミットして状態を永続化するため write が必要。
permissions:
  contents: write

concurrency:
  group: news-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: news_digest/requirements.txt

      - name: Install dependencies
        run: pip install -r news_digest/requirements.txt

      - name: Run digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          MODE="${{ github.event.inputs.mode || 'send' }}"
          case "$MODE" in
            dry-run) python news_digest/digest.py --dry-run ;;
            init)    python news_digest/digest.py --init ;;
            *)       python news_digest/digest.py ;;
          esac

      - name: Commit updated manifest
        if: ${{ github.event.inputs.mode != 'dry-run' }}
        run: |
          if [[ -n "$(git status --porcelain news_digest/manifest.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add news_digest/manifest.json
            git commit -m "chore(digest): update manifest [skip ci]"
            git push
          else
            echo "manifest に変更なし。コミットなし。"
          fi
